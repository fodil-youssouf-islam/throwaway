name: PR Promotion Guard

on:
  pull_request:
    branches:
      - staging
      - preprod
      - main
    types: [opened, reopened, edited, synchronize]

permissions:
  contents: read

jobs:
  validate-promotion-flow:
    # The check-run name is keyed to the TARGET branch so that two PRs sharing
    # the same head commit (e.g. one feature branch opened into both staging and
    # main) produce DISTINCT check runs. Without this, GitHub dedups by name on
    # the shared SHA and the latest run's result bleeds across both PRs' merge
    # gates — letting a passing "→ staging" run mark an invalid "→ main" PR as
    # mergeable. Distinct names give each PR its own independent required check.
    name: promotion-guard-${{ github.base_ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Enforce promotion flow (staging → preprod → main)
        env:
          BASE: ${{ github.base_ref }}   # target branch
          HEAD: ${{ github.head_ref }}   # source branch
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          echo "PR: $HEAD → $BASE"

          # --- Hotfix exception -------------------------------------------
          # hotfix/* may target ANY protected branch directly.
          case "$HEAD" in
            hotfix/*)
              echo "✅ Hotfix exception: '$HEAD' → '$BASE' allowed."
              exit 0 ;;
          esac

          # --- Automated downstream sync (branch-synchronization.yml) -----
          # Allows main→preprod and preprod→staging ONLY for bot-created sync PRs.
          # Human back-flow PRs without these signals remain blocked.
          IS_SYNC=false
          if [ "$PR_AUTHOR" = "github-actions[bot]" ]; then IS_SYNC=true; fi
          if echo "$PR_TITLE" | grep -q '\[AUTO-PR\]'; then IS_SYNC=true; fi
          if echo "$PR_LABELS" | grep -qE 'branch-sync|sync-pr'; then IS_SYNC=true; fi
          if [ "$IS_SYNC" = "true" ]; then
            case "$BASE" in
              preprod)
                if [ "$HEAD" = "main" ]; then
                  echo "✅ Automated downstream sync: main → preprod"
                  exit 0
                fi ;;
              staging)
                if [ "$HEAD" = "preprod" ]; then
                  echo "✅ Automated downstream sync: preprod → staging"
                  exit 0
                fi ;;
            esac
            echo "::error::Sync PR detected but invalid pairing '$HEAD' → '$BASE'."
            exit 1
          fi

          # --- Normal promotion rules -------------------------------------
          case "$BASE" in
            main)
              ALLOWED="preprod" ;;
            preprod)
              ALLOWED="staging" ;;
            staging)
              # staging is the entry point: any feature/fix branch is fine,
              # but downstream branches must not flow back via a normal PR.
              case "$HEAD" in
                preprod|main)
                  echo "::error::'staging' must not receive PRs from '$HEAD' (use a hotfix/* branch for back-merges)."
                  exit 1 ;;
                *)
                  echo "✅ '$HEAD' → staging allowed."
                  exit 0 ;;
              esac ;;
            *)
              echo "No promotion rule for base '$BASE'."; exit 0 ;;
          esac

          if [ "$HEAD" != "$ALLOWED" ]; then
            echo "::error::Invalid promotion. '$BASE' only accepts PRs from '$ALLOWED' (or hotfix/*), but got '$HEAD'."
            echo "Respect the flow: staging → preprod → main."
            exit 1
          fi
          echo "✅ Valid promotion: $HEAD → $BASE"